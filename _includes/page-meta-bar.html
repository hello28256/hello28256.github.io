{% assign locale = include.locale | default: site.locale %}
{% assign updated = page.last_modified_at | default: page.date %}
<style>
  /* 兜底：关键样式内联进 HTML，绕过 SCSS 编译遗漏导致 GitHub Pages
     上看不到 edit 链接 / 时间高亮。SCSS 里的同名规则仍是主样式。 */
  .page-meta-bar {
    display: flex !important;
    justify-content: space-between !important;
    align-items: center !important;
    flex-wrap: wrap !important;
    gap: 0.5em !important;
    margin-top: 2em !important;
    padding-bottom: 1em !important;
    border-bottom: 1px solid #e5e7eb !important;
    font-size: 0.85rem !important;
  }
  .page-meta-bar__edit {
    color: #00875a !important;
    text-decoration: none !important;
  }
  .page-meta-bar__edit:hover { text-decoration: underline !important; }
  .page-meta-bar__edit i { margin-inline-end: 0.4em; }
  .page-meta-bar__updated {
    color: inherit !important;
    font-size: 0.875rem !important;
    font-weight: 500 !important;
  }
</style>
<div class="page-meta-bar">
  <a class="page-meta-bar__edit"
     href="https://github.com/{{ site.repository }}/edit/main/{{ page.path }}"
     target="_blank" rel="noopener noreferrer">
     <i class="fas fa-pen-to-square" aria-hidden="true"></i>
     在 GitHub 上编辑此页
  </a>
  {% if updated %}
  <span class="page-meta-bar__updated">
    Last updated: <time datetime="{{ updated | date_to_xmlschema }}">{{ updated | date: "%Y/%-m/%-d %H:%M" }}</time>
  </span>
  {% endif %}
</div>
