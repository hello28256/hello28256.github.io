# Minimal Mistakes × dark 配置（基于 mm-temp/docs/_config.yml 改造）

# 通过 fork/direct-copy 路线：mm 主题的 _layouts / _includes / _sass / _data
# / assets/css/main.scss / assets/js 全部直接放在本仓里。theme gem 仍装，作为
# fallback + 给 _sass/main.scss 提供 @import 路径。
theme                   : "minimal-mistakes-jekyll"
minimal_mistakes_skin   : "dark"        # 深色皮肤：背景 #252a34、主色 #00adb5

# Site Settings
locale                  : "zh-CN"
title                   : "hello28256"
title_separator         : "-"
# subtitle 留空字符串：masthead 不再渲染下面那一行小字（"代码 · 阅读"）
subtitle                : ""
name                    : &name "hello28256"
description             : &description "hello28256 的个人主页：技术博客、项目作品集、在线书。"
url                     : "https://hello28256.github.io"
baseurl                 : ""
repository              : "hello28256/hello28256.github.io"
masthead_title          : "hello28256"

timezone                : "Asia/Shanghai"
paginate                : 10
words_per_minute        : 200

# 作者信息（侧栏 + footer）
author:
  name             : *name
  avatar           : /assets/images/avatar.png
  bio              : "8 年全栈工程师 / 阅读者 / 写作者"
  location         : "China"
  email            : "hello28256@gmail.com"
  links:
    - label: "GitHub"
      url:  "https://github.com/hello28256"
    - label: "Email"
      url:  "mailto:hello28256@gmail.com"

# 顶部导航（external 走子站 /book/ 和 /Coding/...）
navigation:
  - title: "我的阅读"
    url : "https://hello28256.github.io/book/"
    external: true
  - title: "Coding"
    url : "https://hello28256.github.io/Coding/1001Coding/"
    external: true

# 文章默认布局 + URL
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      comments: false
      share : true
      related: false
      toc   : true
      toc_sticky: true
      author_profile: false
      read_time    : true
      permalink    : /posts/:year/:month/:day/:title/
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

# 关闭搜索（避免初版引入 lunr/algolia 复杂度）
search                  : false

# 评论 / 分享（默认关；后续要打开再加）
comments:
  provider              :
share                   : true

# Markdown / 代码高亮
kramdown:
  syntax_highlighter    : rouge
  syntax_highlighter_opts:
    css_class           : highlight
    block:
      line_numbers      : true
      start_line        : 1

# 插件列表
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# 让 _pages/ 目录下的 markdown 被当 pages 输出
collections:
  pages:
    output: true

# Sass 输出设置
sass:
  style                  : compressed

# HTML 压缩
compress_html:
  clippings              : all
  comments               : all
  endings                : all
  profile                : false
  blanklines             : false
  ignore:
    envs: [development]

# 构建排除
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - ".git"
  - ".github"
  - "Gemfile"
  - "Gemfile.lock"

# 文章页布局：双列（文章 + 右 TOC），不显示左 author sidebar
# - author_profile: false（_config.yml defaults 里）
# - 不在 site.sidebar 里挂全局导航（之前会让所有文章页都出现左 nav sidebar）
