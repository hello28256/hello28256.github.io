name: Deploy VitePress site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run docs:build

      - name: 写入 version.json
        # 让前端能感知"有新版本部署"。时间戳来自 GHA 自身时钟，
        # 比 git log 的最后提交时间更准（rebase / force push 后也能反映新版本）。
        # 路径放在 dist 根目录，部署后访问 /version.json 即可。
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '{"version":"%s"}\n' "$TS" > docs/.vitepress/dist/version.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4